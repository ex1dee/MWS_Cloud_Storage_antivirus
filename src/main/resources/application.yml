spring:
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT}
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASS}

antivirus:
  redis:
    prefix: "file:scan:"
    ttl-hours: 24

  queues:
    tasks: "scan-tasks"
    results: "scan-results"

  clamav:
    host: ${CLAMAV_HOST}
    port: ${CLAMAV_PORT}

  fast-scan:
    tika-read-limit: 8192

  s3:
    url: ${S3_URL}
    access-key: ${S3_ACCESS_KEY}
    secret-key: ${S3_SECRET_KEY}
    region: ${S3_REGION}

    user-data-bucket:
      name: ${S3_BUCKET_NAME}